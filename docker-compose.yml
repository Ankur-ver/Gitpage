version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: gitpage-mongodb
    restart: unless-stopped
    networks:
      - gitpage-network
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: gitpage

  # ── Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gitpage-backend
    restart: unless-stopped
    # No ports exposed to host 
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/gitpage?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: https://${DOMAIN_NAME}
      OPENAI_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - mongodb
    volumes:
      - repos_data:/app/repos
    networks:
      - gitpage-network

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: gitpage-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - gitpage-network

  # ── Nginx (The Front Door) ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: gitpage-nginx
    restart: always
    ports:
      - "80:80"      # Standard Web
      - "443:443"    # Secure Web (SSL)
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - gitpage-network

volumes:
  mongodb_data:
  repos_data:
  certbot_conf: # Fixed name
  certbot_www:  # Fixed name

networks:
  gitpage-network:
    driver: bridge