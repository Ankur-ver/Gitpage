server {
    listen 80;
    
    # 1. Serve Frontend Static Files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy API requests to the Backend Container
    # Note: 'gitpage-backend' matches the container_name in your docker-compose.yml
    location /api/ {
        proxy_pass http://gitpage-backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 3. Proxy Socket.io (For Real-time AI and Notifications)
    location /socket.io/ {
        proxy_pass http://gitpage-backend:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}